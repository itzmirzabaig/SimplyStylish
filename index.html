<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join the Luxe List</title>
  <style>
    /* 🌟 Base Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* 💖 Luxe Gradient Background with Shimmer Layers */
    body {
      background: radial-gradient(circle at top left, #ffc4dd, #ff9bc1, #ff76aa);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .glow-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 3px),
                  linear-gradient(120deg, rgba(255,255,255,0.04), rgba(255,255,255,0));
      animation: pulseGlow 8s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 0.9; transform: scale(1.05); }
    }

    /* 🎀 Form Container */
    .newsletter-container {
      position: relative;
      z-index: 2;
      background: white;
      padding: 3rem 3rem 2.5rem;
      border-radius: 2rem;
      box-shadow: 0 0 60px rgba(204, 58, 126, 0.35);
      max-width: 480px;
      width: 90vw;
      text-align: center;
    }

    .newsletter-container h1 {
      font-size: 2.5rem;
      color: #a70052;
      margin-bottom: 0.5rem;
    }

    .newsletter-container p {
      color: #c94f8a;
      font-size: 1.15rem;
      margin-bottom: 1.8rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    input[type="email"] {
      padding: 1rem 1.25rem;
      font-size: 1rem;
      border-radius: 1rem;
      border: 2px solid #e676a9;
      outline: none;
      transition: 0.3s;
    }

    input[type="email"]:focus {
      border-color: #ffaad4;
    }

    button {
      background: linear-gradient(45deg, #db3e8c, #ff7fbd);
      color: white;
      padding: 1rem;
      font-size: 1.15rem;
      font-weight: bold;
      border: none;
      border-radius: 1rem;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(219, 62, 140, 0.45);
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(45deg, #ff7fbd, #db3e8c);
    }

    .response-message {
      font-size: 1rem;
      color: #a8396e;
      margin-top: 1rem;
      min-height: 1.5rem;
    }

    /* ✨ Floating Bokeh Dots */
    .bokeh {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .dot {
      position: absolute;
      width: 15px;
      height: 15px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      animation: floatUp 15s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      50% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="glow-overlay"></div>
  <div class="bokeh" id="bokeh-layer"></div>

  <section class="newsletter-container">
    <h1>Join the Luxe List</h1>
    <p>Get VIP access, secret drops & glam rewards.</p>

    <form id="newsletter-form">
      <input type="email" name="email" placeholder="Enter your email ✨" required />
      <button type="submit">Subscribe</button>
      <span class="response-message" id="response"></span>
    </form>
  </section>

  <script>
    // Bokeh animation dots generator
    const bokehLayer = document.getElementById('bokeh-layer');
    for (let i = 0; i < 40; i++) {
      const dot = document.createElement('div');
      dot.classList.add('dot');
      dot.style.left = `${Math.random() * 100}%`;
      dot.style.animationDuration = `${10 + Math.random() * 10}s`;
      dot.style.width = dot.style.height = `${10 + Math.random() * 25}px`;
      bokehLayer.appendChild(dot);
    }

    // Google Sheets Newsletter Handler
    const form = document.getElementById('newsletter-form');
    const responseEl = document.getElementById('response');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      responseEl.textContent = 'Sending...';
      const data = new FormData(form);

      try {
        const res = await fetch('https://script.google.com/macros/s/AKfycbwg3e_U5_3GYOFlKYuxpFx_q7YlFglUaU5KHmh-QnhVqXJV9iUWU07MTBjRZ2g4dce3SQ/exec', {
          method: 'POST',
          body: data
        });

        if (res.ok) {
          responseEl.textContent = "You're in 💎 Welcome to the Luxe List!";
          form.reset();
        } else {
          throw new Error('Submission failed');
        }
      } catch {
        responseEl.textContent = "Something went wrong. Try again!";
      }
    });
  </script>
</body>
</html>
